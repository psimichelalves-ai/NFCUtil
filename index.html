<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NFCUtil</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">

  <!-- Biblioteca QR Code -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body { font-family: Arial; text-align: center; padding: 20px; }
    select, input, button { padding: 10px; margin: 10px; width: 90%; }
    #descricao { font-weight: bold; margin-top: 10px; }
    #reader { width: 300px; margin: auto; }
  </style>
</head>
<body>

<h1>NFCUtil</h1>

<!-- SELECT -->
<h2>Selecionar Carta</h2>
<select id="cartas"></select>
<p id="descricao"></p>

<!-- INPUT MANUAL -->
<h2>Ou digitar código</h2>
<input type="text" id="codigoManual" placeholder="Ex: PLANEJ01">

<!-- BOTÕES -->
<h2>Gravar NFC</h2>
<button onclick="gravarNFC()">Gravar</button>

<h2>Ler NFC</h2>
<button onclick="lerNFC()">Ler Tag</button>

<h2>Ler QR Code</h2>
<button onclick="iniciarQR()">Ler QR</button>

<div id="reader"></div>

<p id="resultado">Aguardando ação...</p>

<script src="app.js"></script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js');
}
</script>

</body>
</html>
