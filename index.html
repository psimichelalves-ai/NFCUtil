<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NFCUtil</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">

  <!-- QR Code lib (versão estável) -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8"></script>

  <style>
    body { font-family: Arial; padding: 20px; text-align: center; }
    input, select, button { padding: 10px; margin: 8px; width: 90%; }
    #descricao { font-weight: bold; margin-top: 10px; }
    #reader { width: 300px; margin: auto; }
  </style>
</head>

<body>

<h1>NFCUtil</h1>

<!-- 1. DIGITAÇÃO -->
<h3>1. Digitar código</h3>
<input type="text" id="codigoManual" placeholder="Ex: PLANEJ01">

<!-- 2. SELECT -->
<h3>2. Selecionar carta</h3>
<select id="cartas">
  <option value="">-- Selecione --</option>
</select>
<p id="descricao"></p>

<!-- 3. QR -->
<h3>3. Ler QR Code</h3>
<button onclick="iniciarQR()">Abrir câmera</button>
<div id="reader"></div>

<!-- 4. GRAVAR -->
<h3>4. Gravar NFC</h3>
<button onclick="gravarNFC()">Gravar</button>

<!-- 5. TESTAR -->
<h3>5. Testar NFC</h3>
<button onclick="lerNFC()">Ler NFC</button>

<p id="resultado">Aguardando...</p>

<script src="app.js"></script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js');
}
</script>

</body>
</html>
